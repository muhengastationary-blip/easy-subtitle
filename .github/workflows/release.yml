name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest
      - run: shards install
      - run: crystal spec
      - run: crystal tool format --check

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "$PWD:/work" \
            --workdir /work \
            crystallang/crystal:latest-alpine \
            sh -lc 'shards install --production && crystal build src/easy_subtitle.cr -o easy-subtitle --release --no-debug --static'
          strip easy-subtitle

      - name: Package
        run: |
          tar czf easy-subtitle-linux-x86_64.tar.gz easy-subtitle
          sha256sum easy-subtitle-linux-x86_64.tar.gz > easy-subtitle-linux-x86_64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            easy-subtitle-linux-x86_64.tar.gz
            easy-subtitle-linux-x86_64.tar.gz.sha256

  build-macos-arm:
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install dependencies
        run: brew install libyaml openssl@3 pcre2

      - name: Build release binary
        run: |
          shards install --production
          crystal build src/easy_subtitle.cr -o easy-subtitle --release --no-debug
          strip easy-subtitle

      - name: Sign binary
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          if [ -n "$MACOS_CERTIFICATE" ]; then
            # Import certificate into temporary keychain
            KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
            security create-keychain -p "$MACOS_KEYCHAIN_PWD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" $KEYCHAIN_PATH

            echo "$MACOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
            security import $RUNNER_TEMP/certificate.p12 -k $KEYCHAIN_PATH \
              -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple: \
              -s -k "$MACOS_KEYCHAIN_PWD" $KEYCHAIN_PATH
            security list-keychains -d user -s $KEYCHAIN_PATH login.keychain

            # Sign the binary
            /usr/bin/codesign --force --options runtime \
              --sign "$MACOS_SIGNING_IDENTITY" \
              --timestamp easy-subtitle

            # Verify
            codesign --verify --verbose easy-subtitle
            echo "Binary signed successfully"
          else
            echo "No signing certificate configured, shipping unsigned"
            # Ad-hoc sign so macOS doesn't reject it outright
            codesign --force --sign - easy-subtitle
          fi

      - name: Package
        run: |
          tar czf easy-subtitle-macos-arm64.tar.gz easy-subtitle
          shasum -a 256 easy-subtitle-macos-arm64.tar.gz > easy-subtitle-macos-arm64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            easy-subtitle-macos-arm64.tar.gz
            easy-subtitle-macos-arm64.tar.gz.sha256

  release:
    needs: [build-linux, build-macos-arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            easy-subtitle-linux-x86_64.tar.gz
            easy-subtitle-linux-x86_64.tar.gz.sha256
            easy-subtitle-macos-arm64.tar.gz
            easy-subtitle-macos-arm64.tar.gz.sha256

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Read checksums
        id: checksums
        run: |
          LINUX_SHA=$(awk '{print $1}' easy-subtitle-linux-x86_64.tar.gz.sha256)
          MACOS_SHA=$(awk '{print $1}' easy-subtitle-macos-arm64.tar.gz.sha256)
          echo "linux_sha=$LINUX_SHA" >> "$GITHUB_OUTPUT"
          echo "macos_sha=$MACOS_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: akitaonrails/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          cat > Formula/easy-subtitle.rb << 'FORMULA'
          class EasySubtitle < Formula
            desc "Automated subtitle extraction, downloading, and synchronization"
            homepage "https://github.com/akitaonrails/easy-subtitle"
            version "VERSION_PLACEHOLDER"
            license "GPL-3.0-or-later"

            on_macos do
              on_arm do
                url "https://github.com/akitaonrails/easy-subtitle/releases/download/v#{version}/easy-subtitle-macos-arm64.tar.gz"
                sha256 "MACOS_SHA_PLACEHOLDER"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/akitaonrails/easy-subtitle/releases/download/v#{version}/easy-subtitle-linux-x86_64.tar.gz"
                sha256 "LINUX_SHA_PLACEHOLDER"
              end
            end

            depends_on "mkvtoolnix"

            def install
              bin.install "easy-subtitle"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/easy-subtitle --version")
            end
          end
          FORMULA

          # Replace placeholders with actual values
          sed -i "s/VERSION_PLACEHOLDER/${{ steps.version.outputs.version }}/" Formula/easy-subtitle.rb
          sed -i "s/LINUX_SHA_PLACEHOLDER/${{ steps.checksums.outputs.linux_sha }}/" Formula/easy-subtitle.rb
          sed -i "s/MACOS_SHA_PLACEHOLDER/${{ steps.checksums.outputs.macos_sha }}/" Formula/easy-subtitle.rb

          # Fix indentation (heredoc adds leading spaces)
          sed -i 's/^          //' Formula/easy-subtitle.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/easy-subtitle.rb
          git commit -m "easy-subtitle ${{ steps.version.outputs.version }}"
          git push
